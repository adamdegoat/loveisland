<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Love Island</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif}

/* ── WORLD ───────────────────────────────────────────── */
#world{position:relative;width:100vw;height:100vh;overflow:hidden;transition:background 4s ease}

#world.morning{background:linear-gradient(to bottom,
  #e05c1a 0%,#f7923a 6%,#ffc87a 13%,#87ceeb 26%,#b8e4f9 36%,
  #3a7020 44%,#2d5e18 52%,#4a7a28 58%,#5a8838 63%,
  #c4a060 70%,#b08848 76%,#1a6888 82%,#0d3e58 90%,#071828 100%)}

#world.afternoon{background:linear-gradient(to bottom,
  #1a8ed0 0%,#3ab4f0 10%,#87ceeb 22%,#b8e4f9 32%,
  #3a7020 44%,#2d5e18 52%,#4a7a28 58%,#5a8838 63%,
  #c4a060 70%,#b08848 76%,#1a6888 82%,#0d3e58 90%,#071828 100%)}

#world.night{background:linear-gradient(to bottom,
  #050a14 0%,#0a1020 8%,#0d1830 18%,#141f38 28%,
  #122018 44%,#0e1a10 52%,#142010 58%,#1a2810 63%,
  #706040 70%,#604e30 76%,#0a2840 82%,#061020 90%,#030810 100%)}

/* Stars canvas */
#stars{position:absolute;inset:0;width:100%;height:32%;pointer-events:none;z-index:1;opacity:0;transition:opacity 3s}
#world.night #stars{opacity:1}

/* ── LANDMARKS (emoji) ───────────────────────────────── */
.lm{position:absolute;z-index:3;pointer-events:none;transform:translate(-50%,-50%);
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.6));line-height:1;transition:opacity 3s}
#world.night .lm{filter:drop-shadow(0 2px 8px rgba(0,0,0,.9)) brightness(.65)}

/* ── CHARACTERS ──────────────────────────────────────── */
.char{position:absolute;z-index:10;cursor:pointer;transform:translate(-50%,-100%);
  transition:left 2.8s cubic-bezier(.4,0,.2,1),top 2.8s cubic-bezier(.4,0,.2,1)}
.char-svg{display:block;filter:drop-shadow(0 5px 10px rgba(0,0,0,.5));
  animation:bob 2.4s ease-in-out infinite}
.char-svg.sad{animation:bob-slow 3.5s ease-in-out infinite}
.char-svg.angry{animation:bob-tense .9s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes bob-slow{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes bob-tense{0%,100%{transform:translateY(0) rotate(-.5deg)}50%{transform:translateY(-2px) rotate(.5deg)}}

.nametag{text-align:center;font-size:10px;font-weight:800;letter-spacing:.6px;
  text-transform:uppercase;margin-top:3px;
  text-shadow:0 1px 6px rgba(0,0,0,.9),0 0 10px rgba(0,0,0,.7)}
#char-marcus .nametag{color:#93c5fd}
#char-ryan .nametag{color:#fde68a}
#char-jade .nametag{color:#fbcfe8}

/* ── THOUGHT BUBBLE ──────────────────────────────────── */
.bubble{position:absolute;bottom:82px;left:50%;transform:translateX(-50%) translateY(6px);
  background:rgba(255,255,255,.95);color:#0f172a;padding:8px 12px;border-radius:14px;
  font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;
  max-width:175px;min-width:120px;text-align:center;line-height:1.45;
  box-shadow:0 6px 24px rgba(0,0,0,.4);opacity:0;pointer-events:none;
  transition:opacity .22s,transform .22s;z-index:20;white-space:normal;letter-spacing:-.1px}
.bubble.on{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.bubble::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  border:8px solid transparent;border-top-color:rgba(255,255,255,.95);border-bottom:0}

/* ── MOOD BADGE ──────────────────────────────────────── */
.mood-badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  font-size:14px;line-height:1;pointer-events:none}

/* ── HUD ─────────────────────────────────────────────── */
#hud{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(4,10,24,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,.07);padding:.55rem 1rem;
  display:flex;align-items:center;gap:.75rem;min-height:52px}

.hud-info{display:flex;align-items:center;gap:.4rem;font-size:12px;color:rgba(255,255,255,.45);flex-shrink:0}
.hud-day{font-weight:800;color:rgba(255,255,255,.9);font-size:13px}
.hud-sep{opacity:.25}

/* Status strip */
#status-strip{flex:1;display:flex;align-items:center;gap:.3rem;font-size:10px;flex-wrap:wrap}
.stp{display:inline-flex;align-items:center;gap:.2rem;padding:.18rem .55rem;border-radius:8px;
  border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.22);
  font-weight:700;letter-spacing:.3px;text-transform:uppercase;transition:all .4s}
.stp.running{color:#fbbf24;border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.1);
  animation:spulse 1s ease-in-out infinite}
.stp.done{color:#4ade80;border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.07)}
@keyframes spulse{0%,100%{opacity:1}50%{opacity:.55}}
.stp-arrow{color:rgba(255,255,255,.15);font-size:9px;margin:0 .05rem}
#status-msg{font-size:10px;color:rgba(255,255,255,.3);font-style:italic;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}

/* Buttons */
.hud-actions{display:flex;align-items:center;gap:.5rem;margin-left:auto;flex-shrink:0}
#run-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.32rem .85rem;
  border-radius:20px;border:1px solid rgba(244,114,182,.4);background:rgba(244,114,182,.12);
  color:#f472b6;font-size:11px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
#run-btn:hover:not(:disabled){background:rgba(244,114,182,.22);transform:translateY(-1px);
  box-shadow:0 4px 18px rgba(244,114,182,.3)}
#run-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
#run-btn.busy{color:#fbbf24;border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.1)}
#run-btn.done{color:#4ade80;border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.08)}

#story-btn{display:inline-flex;align-items:center;gap:.25rem;padding:.32rem .75rem;
  border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.5);font-size:11px;font-weight:700;letter-spacing:.3px;
  text-transform:uppercase;text-decoration:none;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
#story-btn:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.85);background:rgba(255,255,255,.09)}

@media(max-width:520px){
  #status-strip{display:none}
  .hud-info{font-size:11px}
  #run-btn,#story-btn{padding:.28rem .65rem;font-size:10px}
}
</style>
</head>

  hopeful:  { marcus:'M -4 -64.5 Q 0 -61.5 4 -64.5', ryan:'M -4.5 -64.5 Q 0 -61.5 4.5 -64.5',jade:'M -3.5 -64.5 Q 0 -61.5 3.5 -64.5'},
}
const MOOD_EMOJI = {
  happy:'😄',cheerful:'😊',free:'😌',calm:'😌',content:'🙂',peaceful:'😌',hopeful:'🙂',
  neutral:'😐',guarded:'😶',distant:'😶',cold:'😶',restless:'😕',
  sad:'😔',lonely:'😔',melancholy:'😔',
  angry:'😤',frustrated:'😤',irritated:'😤',
  pensive:'🤔',thoughtful:'🤔',reflective:'🤔',
  warm:'🙂'
}
const CYCLE_CLASS = {morning:'morning', afternoon:'afternoon', night:'night'}
const WX = {clear:'☀️',rain:'🌧️',storm:'⛈️',overcast:'☁️',foggy:'🌫️'}

let S = {chars:{}, feed:[], world:{}}
let openBubble = null

// coord → CSS %
function toPos(x, y) {
  return { left: (6 + (x/100)*86) + '%', top: (16 + (y/100)*56) + '%' }
}

function placeChar(cid) {
  const c = S.chars[cid]
  if(!c) return
  const el = document.getElementById('char-' + cid)
  const {left, top} = toPos(c.location.x, c.location.y)
  el.style.left = left
  el.style.top  = top
}

function applyMood(cid) {
  const c = S.chars[cid]
  if(!c) return
  const mood = (c.mood||'neutral').toLowerCase()
  const mouths = MOUTHS[mood] || MOUTHS.neutral
  const mPath = document.getElementById('mouth-' + cid)
  if(mPath) mPath.setAttribute('d', mouths[cid])
  const badge = document.getElementById('mood-' + cid)
  if(badge) badge.textContent = MOOD_EMOJI[mood] || '😐'
  // animation class
  const svg = document.getElementById('svg-' + cid)
  if(svg) {
    svg.classList.remove('sad','angry')
    if(['sad','lonely','melancholy','distant'].includes(mood)) svg.classList.add('sad')
    if(['angry','frustrated'].includes(mood)) svg.classList.add('angry')
  }
}

function updateBubble(cid) {
  const feed = S.feed
  const latest = [...feed].reverse().find(e => e.character === cid && (e.thought || e.action))
  const el = document.getElementById('bubble-' + cid)
  if(el && latest) el.textContent = latest.thought || latest.action || '...'
}

function toggleBubble(cid) {
  if(openBubble && openBubble !== cid) {
    document.getElementById('bubble-' + openBubble)?.classList.remove('on')
  }
  const el = document.getElementById('bubble-' + cid)
  if(!el) return
  const isOn = el.classList.contains('on')
  el.classList.toggle('on', !isOn)
  openBubble = !isOn ? cid : null
}

function updateWorld() {
  const w = S.world
  document.getElementById('day-label').textContent = 'Day ' + w.day
  document.getElementById('cycle-label').textContent = cap(w.cycle||'')
  document.getElementById('weather-label').textContent = WX[w.weather]||'☀️'
  const wClass = CYCLE_CLASS[w.cycle] || 'afternoon'
  document.getElementById('world').className = wClass
  drawStars(wClass === 'night')
  ;['marcus','ryan','jade'].forEach(cid => {
    placeChar(cid)
    applyMood(cid)
    updateBubble(cid)
  })
}

// Stars
function drawStars(active) {
  if(!active) return
  const c = document.getElementById('stars')
  c.width = window.innerWidth; c.height = window.innerHeight * .32
  const ctx = c.getContext('2d')
  ctx.clearRect(0,0,c.width,c.height)
  // Use a seeded-ish pattern so stars don't flicker on redraw
  for(let i=0;i<120;i++){
    const x=(Math.sin(i*137.5)*0.5+0.5)*c.width
    const y=(Math.sin(i*97.3)*0.5+0.5)*c.height
    const r=Math.sin(i*43.1)*0.5+0.8
    const a=Math.sin(i*61.7)*0.3+0.7
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2)
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill()
  }
}

function cap(s){return s?s[0].toUpperCase()+s.slice(1):''}

// ── RUN DAY ──────────────────────────────────────────
const STEPS = ['morning','afternoon','night']

function setStep(cycle, state) {
  const el = document.getElementById('stp-' + cycle)
  if(!el) return
  el.classList.remove('running','done')
  if(state === 'running') el.classList.add('running')
  if(state === 'done') el.classList.add('done')
}

function resetSteps() {
  STEPS.forEach(s => setStep(s, 'pending'))
}

async function runDay() {
  const btn = document.getElementById('run-btn')
  const msg = document.getElementById('status-msg')
  btn.disabled = true
  btn.classList.add('busy')
  btn.textContent = '⏳ Running…'
  resetSteps()
  msg.textContent = 'Starting…'

  try {
    const r = await fetch('http://localhost:7777/runday', {signal: AbortSignal.timeout(3000)})
    const d = await r.json()
    if(d.status !== 'started') {
      showBtnMsg(btn, 'busy', 'Already running…', 2500)
      return
    }
    // Poll for progress
    const timer = setInterval(async () => {
      try {
        const sr = await fetch('http://localhost:7777/status', {signal: AbortSignal.timeout(2000)})
        const s = await sr.json()
        // Update step indicators
        STEPS.forEach(cyc => {
          if(s.cycles_done?.includes(cyc)) setStep(cyc, 'done')
          else if(s.current_cycle === cyc) setStep(cyc, 'running')
          else setStep(cyc, 'pending')
        })
        const cycleLabels = {morning:'🌅 Morning',afternoon:'☀️ Afternoon',night:'🌙 Night'}
        if(s.current_cycle) {
          msg.textContent = cycleLabels[s.current_cycle] + ' running…'
          btn.textContent = '⏳ ' + cap(s.current_cycle) + '…'
        }
        if(!s.running) {
          clearInterval(timer)
          STEPS.forEach(c => setStep(c, 'done'))
          msg.textContent = 'Done!'
          btn.classList.remove('busy')
          btn.classList.add('done')
          btn.textContent = '✓ Day done'
          await reloadData()
          setTimeout(() => {
            btn.classList.remove('done')
            btn.textContent = '▶ Run Day'
            btn.disabled = false
            msg.textContent = ''
          }, 2200)
        }
      } catch {}
    }, 1500)
    setTimeout(() => clearInterval(timer), 120000)
  } catch {
    btn.classList.remove('busy')
    btn.textContent = 'Server offline'
    msg.textContent = 'Start trigger server on Mac'
    setTimeout(() => {
      btn.textContent = '▶ Run Day'; btn.disabled = false; msg.textContent = ''
    }, 3500)
  }
}

function showBtnMsg(btn, cls, text, delay) {
  btn.textContent = text
  setTimeout(() => {
    btn.classList.remove(cls); btn.textContent = '▶ Run Day'; btn.disabled = false
  }, delay)
}

async function reloadData() {
  const t = Date.now()
  const [c,f,w] = await Promise.all([
    fetch('data/characters.json?t='+t).then(r=>r.json()),
    fetch('data/feed.json?t='+t).then(r=>r.json()),
    fetch('data/world.json?t='+t).then(r=>r.json()),
  ])
  S.chars = c; S.feed = f; S.world = w
  updateWorld()
}

async function init() {
  try {
    const [c,f,w] = await Promise.all([
      fetch('data/characters.json').then(r=>r.json()),
      fetch('data/feed.json').then(r=>r.json()),
      fetch('data/world.json').then(r=>r.json()),
    ])
    S.chars = c; S.feed = f; S.world = w
    updateWorld()
    // auto-show thoughts briefly on load
    setTimeout(() => {
      ['marcus','ryan','jade'].forEach(cid => {
        document.getElementById('bubble-' + cid)?.classList.add('on')
      })
      setTimeout(() => {
        ['marcus','ryan','jade'].forEach(cid => {
          if(openBubble !== cid) document.getElementById('bubble-' + cid)?.classList.remove('on')
        })
      }, 4000)
    }, 600)
  } catch(e) {
    document.getElementById('day-label').textContent = 'Error loading'
    console.error(e)
  }
}

init()
</script>
</body>
