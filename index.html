<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Tropicana</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;background:#020617}
#world{position:relative;width:100vw;height:100vh;overflow:hidden}
#world-svg{position:absolute;inset:0;width:100%;height:100%;z-index:0}
#stars{position:absolute;inset:0;width:100%;height:34%;pointer-events:none;z-index:2;opacity:0;transition:opacity 3s}
#world.night #stars,#world.dawn #stars{opacity:1}

/* Cloud animations */
@keyframes cloud-a{from{transform:translateX(0)}to{transform:translateX(1300px)}}
.cl1{animation:cloud-a 90s linear infinite}
.cl2{animation:cloud-a 115s linear infinite;animation-delay:-40s}
.cl3{animation:cloud-a 72s linear infinite;animation-delay:-22s}

/* Fire animations */
@keyframes flk{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.22) scaleX(.9)}}
.fa{animation:flk .75s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}
.fb{animation:flk .55s ease-in-out infinite reverse;transform-box:fill-box;transform-origin:50% 100%}
.fc{animation:flk .42s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}

/* Wave animations */
@keyframes wv{from{transform:translateX(0)}to{transform:translateX(500px)}}
.wa{animation:wv 13s linear infinite}
.wb{animation:wv 19s linear infinite reverse}

/* SVG transitions */
#sky-bg,#sun-group,#moon-group,#night-stars,#night-overlay{transition:opacity 2.5s ease}

/* ── DAY STAMP ── */
#day-stamp{position:fixed;top:22px;left:18px;z-index:30;pointer-events:none;line-height:1.15}
#ds-day{font-family:'Plus Jakarta Sans',sans-serif;font-size:38px;font-weight:800;
  color:rgba(255,255,255,.1);letter-spacing:-1px}
#ds-cycle{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.07);letter-spacing:3.5px;text-transform:uppercase}

/* ── CHARACTERS ── */
.char{position:absolute;z-index:20;transform:translate(-50%,-100%);
  transition:left 2.8s cubic-bezier(.4,0,.2,1),top 2.8s cubic-bezier(.4,0,.2,1)}
.char-svg{display:block;filter:drop-shadow(0 6px 14px rgba(0,0,0,.65));animation:bob 2.4s ease-in-out infinite}
.char-svg.sad{animation:bob-slow 3.5s ease-in-out infinite}
.char-svg.angry{animation:bob-tense .9s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bob-slow{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes bob-tense{0%,100%{transform:translateY(0) rotate(-.5deg)}50%{transform:translateY(-3px) rotate(.5deg)}}
.nametag{text-align:center;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;margin-top:4px;
  text-shadow:0 1px 6px rgba(0,0,0,.9),0 0 10px rgba(0,0,0,.7)}
#char-marcus .nametag{color:#93c5fd}
#char-ryan .nametag{color:#fde68a}
#char-jade .nametag{color:#fbcfe8}

/* ── SPEECH BUBBLES (always visible) ── */
.bubble{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.38);color:#f1f5f9;padding:7px 11px;border-radius:12px;
  font-size:10px;font-weight:600;max-width:165px;min-width:105px;text-align:center;
  line-height:1.45;box-shadow:0 4px 18px rgba(0,0,0,.25);pointer-events:none;
  white-space:normal;z-index:25;border:1px solid rgba(255,255,255,.06)}
.bubble::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
  border:7px solid transparent;border-top-color:rgba(0,0,0,.38);border-bottom:0}
.bubble-name{font-size:9px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;margin-bottom:3px}
#char-marcus .bubble-name{color:#93c5fd}
#char-ryan .bubble-name{color:#fde68a}
#char-jade .bubble-name{color:#f9a8d4}
.bubble-text{font-size:10.5px}

/* ── NEON CHAT PANEL ── */
#chat-panel{position:fixed;right:0;top:0;bottom:52px;width:265px;
  background:rgba(0,0,0,.38);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:50;display:flex;flex-direction:column;
  border-left:1px solid rgba(255,255,255,.07)}
#chat-header{padding:7px 12px;font-family:'VT323',monospace;font-size:16px;color:#ff2d78;
  border-bottom:1px solid rgba(255,255,255,.07);letter-spacing:2px;display:flex;align-items:center;gap:6px}
#chat-dot{width:6px;height:6px;border-radius:50%;background:#ff2d78;animation:cdot 2s ease-in-out infinite}
@keyframes cdot{0%,100%{opacity:1}50%{opacity:.2}}
#chat-feed{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:5px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
#chat-feed::-webkit-scrollbar{width:3px}
#chat-feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.cl{font-family:'VT323',monospace;font-size:15px;line-height:1.3;word-break:break-word}
.cl.marcus{color:#c084fc}
.cl.ryan{color:#fb923c}
.cl.jade{color:#f472b6}
.cl.interaction{color:#fbbf24}
.cl-label{font-size:11px;letter-spacing:.8px;opacity:.6;text-transform:uppercase}
.cl-dialogue{color:#e2e8f0;font-size:13px;opacity:.9}
.cl-ts{font-family:'VT323',monospace;font-size:12px;color:rgba(255,255,255,.22);letter-spacing:1.2px;text-align:center;padding:4px 0 2px;text-transform:uppercase}
.cl-msg{font-family:'VT323',monospace;font-size:14px;line-height:1.3;padding:1px 4px;word-break:break-word}
.cl-spk{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.cl-line{color:#e2e8f0;opacity:.9}

/* ── HUD ── */
#hud{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(2,6,23,.93);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,.07);padding:0 1rem;
  display:flex;align-items:center;gap:.6rem;height:52px}
.hud-day{font-weight:800;color:rgba(255,255,255,.9);font-size:13px;flex-shrink:0}
.hud-sep{color:rgba(255,255,255,.2);font-size:11px}
#cycle-label{font-size:11px;color:rgba(255,255,255,.45);flex-shrink:0}

/* Status strip */
#status-strip{display:flex;align-items:center;gap:.3rem;font-size:10px;flex-shrink:0}
.stp{display:inline-flex;align-items:center;padding:.15rem .5rem;border-radius:7px;
  border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.22);
  font-weight:700;letter-spacing:.3px;text-transform:uppercase;transition:all .4s}
.stp.running{color:#fbbf24;border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.1);animation:spulse 1s ease-in-out infinite}
.stp.done{color:#4ade80;border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.07)}
@keyframes spulse{0%,100%{opacity:1}50%{opacity:.5}}
.stp-arr{color:rgba(255,255,255,.12);font-size:9px}

/* Tiny status info */
#status-info{font-size:9px;color:rgba(255,255,255,.28);white-space:nowrap;flex-shrink:0;line-height:1.3;letter-spacing:.2px}
#status-info span{color:rgba(255,255,255,.45)}
#status-msg{font-size:9px;color:rgba(255,255,255,.3);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}

/* Buttons */
.hud-actions{display:flex;align-items:center;gap:.45rem;margin-left:auto;flex-shrink:0}
#run-btn{display:inline-flex;align-items:center;gap:.25rem;padding:.28rem .8rem;
  border-radius:18px;border:1px solid rgba(244,114,182,.4);background:rgba(244,114,182,.12);
  color:#f472b6;font-size:11px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
#run-btn:hover:not(:disabled){background:rgba(244,114,182,.22);transform:translateY(-1px);box-shadow:0 4px 16px rgba(244,114,182,.3)}
#run-btn:disabled{opacity:.35;cursor:not-allowed}
#run-btn.busy{color:#fbbf24;border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.1)}
#run-btn.done{color:#4ade80;border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.08)}
#run-btn.maxed{color:#94a3b8;border-color:rgba(148,163,184,.3);background:rgba(148,163,184,.06);cursor:not-allowed}
#story-btn{display:inline-flex;align-items:center;gap:.2rem;padding:.28rem .7rem;
  border-radius:18px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.5);font-size:11px;font-weight:700;letter-spacing:.3px;
  text-transform:uppercase;text-decoration:none;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
#story-btn:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.85);background:rgba(255,255,255,.09)}

/* ── MOBILE ── */
@media(max-width:768px){
  /* Chat panel becomes a bottom drawer */
  #chat-panel{
    top:auto;right:0;left:0;bottom:52px;width:100%;
    height:44px;border-left:none;border-top:1px solid rgba(255,255,255,.1);
    transition:height .3s cubic-bezier(.4,0,.2,1);overflow:hidden
  }
  #chat-panel.mob-open{height:62vh}
  #chat-header{cursor:pointer;justify-content:space-between}
  #chat-chevron{display:inline-block;font-size:11px;transition:transform .3s;color:rgba(255,255,255,.4)}
  #chat-panel.mob-open #chat-chevron{transform:rotate(180deg)}

  /* Oracle: hide on mobile (fits in feed) */
  #oracle-widget{display:none}

  /* HUD: slimmer */
  #status-strip,#status-info,#status-msg{display:none}
  #hud{padding:0 .75rem;height:52px}
  #run-btn{padding:.28rem .7rem;font-size:10px}
  #story-btn{padding:.28rem .55rem;font-size:10px}

  /* Bubbles: slightly smaller */
  .bubble{max-width:130px;font-size:9.5px;padding:5px 9px}
  .bubble-text{font-size:9.5px}

  /* Stat cards: show on tap, not hover */
  .stat-card{display:none}
  .stat-card.tap-open{display:block;opacity:1;transform:translateY(0)}
  /* position stat card above character on mobile */
  .stat-card.right,.stat-card.left{left:50%;transform:translateX(-50%);right:auto}
  .stat-card.tap-open.right,.stat-card.tap-open.left{transform:translateX(-50%)}
}

@media(min-width:769px){
  #chat-chevron{display:none}
}

/* ── HOVER STAT CARD ── */
.stat-card{
  position:absolute;bottom:110%;pointer-events:none;z-index:80;
  width:200px;background:rgba(0,0,0,.92);border-radius:12px;
  padding:11px 13px;opacity:0;transform:translateY(6px);
  transition:opacity .18s ease,transform .18s ease;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  font-family:'VT323',monospace;line-height:1.4;white-space:nowrap
}
.char:hover .stat-card{opacity:1;transform:translateY(0)}
.stat-card.right{left:90%;transform:translateY(6px)}
.stat-card.left{right:90%;transform:translateY(6px)}
.char:hover .stat-card.right{transform:translateY(0)}
.char:hover .stat-card.left{transform:translateY(0)}
.sc-name{font-size:17px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.sc-mood{font-size:13px;color:rgba(255,255,255,.45);letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase}
.sc-section{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:2px}
.sc-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.sc-label{font-size:12px;color:rgba(255,255,255,.4);width:68px;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.sc-bar{flex:1;height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.sc-fill{height:100%;border-radius:3px}
.sc-val{font-size:12px;color:rgba(255,255,255,.5);width:22px;text-align:right;flex-shrink:0}
.sc-bond{font-size:13px;margin-bottom:2px}

/* ── ORACLE WIDGET ── */
#oracle-widget{position:fixed;bottom:52px;left:0;z-index:50;font-family:'VT323',monospace}
#oracle-toggle{display:flex;align-items:center;gap:5px;padding:5px 11px;
  background:rgba(0,0,0,.7);border:none;border-top:1px solid rgba(251,191,36,.25);
  border-right:1px solid rgba(251,191,36,.15);color:rgba(251,191,36,.6);
  font-family:'VT323',monospace;font-size:13px;letter-spacing:2px;cursor:pointer;
  transition:color .2s;width:100%}
#oracle-toggle:hover{color:#fbbf24}
#oracle-badge{font-size:10px;transition:transform .25s}
#oracle-widget.open #oracle-badge{transform:rotate(180deg)}
#oracle-body{max-height:0;overflow:hidden;transition:max-height .3s ease;
  background:rgba(0,0,0,.82);border-right:1px solid rgba(251,191,36,.12);
  border-top:1px solid rgba(251,191,36,.1);backdrop-filter:blur(10px)}
#oracle-widget.open #oracle-body{max-height:120px}
#oracle-label{font-size:11px;color:rgba(251,191,36,.4);letter-spacing:2px;padding:8px 12px 3px}
#oracle-text{font-size:15px;color:#fde68a;padding:0 12px 4px;line-height:1.35;max-width:240px}
#oracle-choice{font-size:12px;color:rgba(251,191,36,.4);padding:0 12px 8px;letter-spacing:1px}
</style>
</head>
<body>
<div id="world" class="afternoon">
<canvas id="stars"></canvas>

<!-- ══ DAY STAMP ══════════════════════════════════════════ -->
<div id="day-stamp"><div id="ds-day">Day 1</div><div id="ds-cycle">—</div></div>

<!-- ══ WORLD SVG ══════════════════════════════════════════ -->
<svg id="world-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="sky-morning" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#c2410c"/><stop offset="20%" stop-color="#ea580c"/>
    <stop offset="42%" stop-color="#fbbf24"/><stop offset="65%" stop-color="#7dd3fc"/>
    <stop offset="100%" stop-color="#bae6fd"/>
  </linearGradient>
  <linearGradient id="sky-midday" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0369a1"/><stop offset="35%" stop-color="#0ea5e9"/>
    <stop offset="70%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#bae6fd"/>
  </linearGradient>
  <linearGradient id="sky-afternoon" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1d4ed8"/><stop offset="40%" stop-color="#0ea5e9"/>
    <stop offset="75%" stop-color="#7dd3fc"/><stop offset="100%" stop-color="#dbeafe"/>
  </linearGradient>
  <linearGradient id="sky-evening" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6d28d9"/><stop offset="22%" stop-color="#be185d"/>
    <stop offset="48%" stop-color="#dc2626"/><stop offset="68%" stop-color="#ea580c"/>
    <stop offset="85%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#fde68a"/>
  </linearGradient>
  <linearGradient id="sky-night" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#020617"/><stop offset="40%" stop-color="#0f172a"/>
    <stop offset="80%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#1e1b4b"/>
  </linearGradient>
  <linearGradient id="sky-dawn" x1="0" y1="0" x2="0" y2="1">

    <stop offset="52%" stop-color="#7c3aed"/><stop offset="72%" stop-color="#be185d"/>
    <stop offset="88%" stop-color="#f97316"/><stop offset="100%" stop-color="#fbbf24"/>
  </linearGradient>

// ── SGT TIME ─────────────────────────────────────────────
const RUN_HOURS = [3,7,11,15,19,23]
const CYCLE_NAMES = {3:'dawn',7:'morning',11:'midday',15:'afternoon',19:'evening',23:'night'}

function getSGT() {
  const now = new Date()
  return new Date(now.getTime() + now.getTimezoneOffset()*60000 + 8*3600000)
}

function skyFromHour(h) {
  if(h>=23||h<3) return 'night'
  if(h<7) return 'dawn'
  if(h<11) return 'morning'
  if(h<15) return 'midday'
  if(h<19) return 'afternoon'
  return 'evening'
}

function fmtTime(sgt) {
  const h=sgt.getHours(), m=String(sgt.getMinutes()).padStart(2,'0')
  const ap=h>=12?'pm':'am', dh=h%12||12
  return `${dh}:${m}${ap}`
}

function nextRun(sgt) {
  const total=sgt.getHours()*60+sgt.getMinutes()
  let nh=RUN_HOURS.find(r=>r*60>total)
  if(nh===undefined) nh=RUN_HOURS[0]+24
  const diff=nh*60-total, dh=Math.floor(diff/60), dm=diff%60
  const h24=nh%24, ap=h24>=12?'pm':'am', dh12=h24%12||12
  return { time:`${dh12}:00${ap}`, cd:dh>0?`${dh}h ${dm}m`:`${dm}m` }
}

function applySky(sky) {
  document.getElementById('sky-bg')?.setAttribute('fill',`url(#sky-${sky})`)
  const isNight=sky==='night'||sky==='dawn'
  document.getElementById('sun-group')?.setAttribute('opacity',isNight?'0':'1')
  document.getElementById('moon-group')?.setAttribute('opacity',isNight?'1':'0')
  document.getElementById('night-stars')?.setAttribute('opacity',isNight?'1':'0')
  document.getElementById('night-overlay')?.setAttribute('opacity',isNight?'0.32':'0')
  drawStars(isNight)
  document.getElementById('world').className=isNight?'night':sky
}

function updateStatusBar() {
  const sgt=getSGT()
  const {time,cd}=nextRun(sgt)
  document.getElementById('status-next').textContent=time
  document.getElementById('status-countdown').textContent=cd

  let lastStr='—'
  if(S.feed&&S.feed.length>0) {
    const ts=S.feed[S.feed.length-1].timestamp
    if(ts) {
      const d=new Date(ts)
      const sgtD=new Date(d.getTime()+d.getTimezoneOffset()*60000+8*3600000)
      lastStr=fmtTime(sgtD)
    }
  }
  document.getElementById('status-last').textContent=lastStr
  applySky(skyFromHour(sgt.getHours()))
}

// ── FACE/CHAR ─────────────────────────────────────────────
const isMobile = () => window.innerWidth <= 768

function toPos(x,y) {
  let safeMaxPct
  if(isMobile()) {
    // On mobile chat is at bottom — characters use full width
    safeMaxPct = 88
  } else {
    // Desktop: keep characters clear of right-side chat panel (265px)
    const charHalf = 30
    const safePx = window.innerWidth - 265 - charHalf
    safeMaxPct = Math.min(76, (safePx / window.innerWidth) * 100)
  }
  const leftPct = 5 + (x / 100) * (safeMaxPct - 5)
  return {left: leftPct+'%', top:(48+(y/100)*32)+'%'}
}

function toggleMobileChat() {
  if(!isMobile()) return
  document.getElementById('chat-panel').classList.toggle('mob-open')
}

  ;['marcus','ryan','jade'].forEach(cid => {
    const el = document.getElementById('char-'+cid)
    if(!el) return
    el.addEventListener('click', () => {
      if(!isMobile()) return
      const sc = document.getElementById('sc-'+cid)
      if(!sc) return
      const wasOpen = sc.classList.contains('tap-open')
      // close all
      document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('tap-open'))
      if(!wasOpen) sc.classList.add('tap-open')
    })
  })
  // tap world to close stat cards
  document.getElementById('world')?.addEventListener('click', e => {
    if(!isMobile()) return
    if(!e.target.closest('.char')) {
      document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('tap-open'))
    }
  })
}

function applyFace(cid) {
  const c=S.chars[cid]; if(!c) return
  const mk=(c.mood||'neutral').toLowerCase()
  const fk=MOOD_MAP[mk]||'neutral'
  const f=FACES[fk]||FACES.neutral

  const bl=document.getElementById('brow-l-'+cid)
  const br=document.getElementById('brow-r-'+cid)
  if(bl) bl.setAttribute('d',f.bl)
  if(br) br.setAttribute('d',f.br)

  document.getElementById('mouth-'+cid)?.setAttribute('d',f.mouth[cid])

  EYE_STATES.forEach(s=>{
    document.getElementById(`eyes-${s}-${cid}`)?.setAttribute('display',s===f.eyes?'':'none')
  })
  document.getElementById('blush-'+cid)?.setAttribute('display',f.blush?'':'none')

  const svg=document.getElementById('svg-'+cid)
  if(svg){
    svg.classList.remove('sad','angry')
    if(['sad','lonely','heartbroken','melancholy'].includes(mk)) svg.classList.add('sad')
    if(['angry','frustrated','furious'].includes(mk)) svg.classList.add('angry')
  }
}

  const el=document.getElementById('thought-'+cid)
  if(el){
    let t=latest?(latest.thought||latest.action||'…'):'…'
    const words=t.split(' ')
    if(words.length>9) t=words.slice(0,9).join(' ')+'…'
    el.textContent=t
  }
}

const CYCLE_HOUR = {dawn:'3am',morning:'7am',midday:'11am',afternoon:'3pm',evening:'7pm',night:'11pm'}
const CHAR_COLOR = {marcus:'#c084fc',ryan:'#fb923c',jade:'#f472b6'}

function cycleLabel(e) {
  return `Day ${e.day||1} · ${CYCLE_HOUR[e.cycle]||e.cycle||''}`
}

function renderChat() {
  const feed=document.getElementById('chat-feed')
  if(!feed||!S.feed) return
  const entries=S.feed.slice(-45)
  let html=''
  let lastLabel=''
  entries.forEach(e=>{
    const lbl=cycleLabel(e)
    if(lbl!==lastLabel){
      html+=`<div class="cl-ts">${lbl}</div>`
      lastLabel=lbl
    }
    if(e.type==='interaction'){
      html+=`<div class="cl interaction"><span class="cl-label">${e.description||''}</span></div>`
      const dlg=e.dialogue||[]
      const arr=Array.isArray(dlg)?dlg:[{speaker:(e.characters||['?'])[0],line:dlg}]
      arr.forEach(d=>{
        const spk=(d.speaker||'').toLowerCase()
        const col=CHAR_COLOR[spk]||'#e2e8f0'
        html+=`<div class="cl-msg"><span class="cl-spk" style="color:${col}">${cap(spk)}</span> <span class="cl-line">${d.line||''}</span></div>`
      })
    } else {
      const ch=e.character||''
      const t=e.thought||e.action||''
      html+=`<div class="cl ${ch}"><span class="cl-label">${ch.toUpperCase()}·</span> ${t}</div>`
    }
  })
  feed.innerHTML=html
  feed.scrollTop=feed.scrollHeight
}

function updateWorld() {
  const w=S.world
  document.getElementById('day-label').textContent='Day '+(w.day||1)
  document.getElementById('cycle-label').textContent=cap(w.cycle||'')
  document.getElementById('ds-day').textContent='Day '+(w.day||1)
  document.getElementById('ds-cycle').textContent=cap(w.cycle||'')
  ;['marcus','ryan','jade'].forEach(cid=>{
    const c=S.chars[cid]; if(!c) return
    const el=document.getElementById('char-'+cid)
    const {left,top}=toPos(c.location?.x||50,c.location?.y||50)
    el.style.left=left; el.style.top=top
    applyFace(cid)
    updateBubble(cid)
  })
  renderChat()
  updateStatusBar()
  updateStatCards()
}

// ── STARS CANVAS ─────────────────────────────────────────
function drawStars(active) {
  const c=document.getElementById('stars')
  if(!active){c.style.opacity='0';return}
  c.width=window.innerWidth;c.height=window.innerHeight*.34
  const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height)
  for(let i=0;i<130;i++){
    const x=(Math.sin(i*137.5)*.5+.5)*c.width
    const y=(Math.sin(i*97.3)*.5+.5)*c.height
    const r=Math.sin(i*43.1)*.5+.8
    const a=Math.sin(i*61.7)*.3+.7
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2)
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill()
  }
}

// ── TRIGGER LIMIT (7 per cycle window) ───────────────────
const MAX_MANUAL = 7

function currentCycleWindow() {
  const h = getSGT().getHours()
  if(h>=23||h<3) return 'night'
  if(h<7) return 'dawn'
  if(h<11) return 'morning'
  if(h<15) return 'midday'
  if(h<19) return 'afternoon'
  return 'evening'
}

function getManualCount() {
  try {
    const raw = localStorage.getItem('li_manual')
    if(!raw) return {window:'',count:0}
    return JSON.parse(raw)
  } catch { return {window:'',count:0} }
}

function incManualCount() {
  const win = currentCycleWindow()
  const cur = getManualCount()
  const count = cur.window === win ? cur.count + 1 : 1
  localStorage.setItem('li_manual', JSON.stringify({window:win, count}))
  return count
}

function manualRemaining() {
  const win = currentCycleWindow()
  const {window:w, count} = getManualCount()
  return w === win ? Math.max(0, MAX_MANUAL - count) : MAX_MANUAL
}

function nextCycleTime() {
  const sgt = getSGT()
  const total = sgt.getHours()*60 + sgt.getMinutes()
  let nh = RUN_HOURS.find(r => r*60 > total)
  if(nh===undefined) nh = RUN_HOURS[0]+24
  const h24 = nh%24, ap = h24>=12?'pm':'am', h12 = h24%12||12
  return `${h12}:00${ap}`
}

function updateRunBtn() {
  const rem = manualRemaining()
  const btn = document.getElementById('run-btn')
  if(!btn) return
  if(rem <= 0) {
    btn.classList.add('maxed')
    btn.disabled = true
    btn.textContent = `✕ Max · resets ${nextCycleTime()}`
  } else {
    btn.classList.remove('maxed','busy','done')
    btn.disabled = false
    btn.textContent = `▶ Run (${MAX_MANUAL - rem}/${MAX_MANUAL})`
  }
}

// ── RUN CYCLE ─────────────────────────────────────────────
const ALL_STEPS=['morning','midday','afternoon','evening','night','dawn']

function setStep(s,state){
  const el=document.getElementById('stp-'+s);if(!el)return
  el.classList.remove('running','done')
  if(state==='running')el.classList.add('running')
  if(state==='done')el.classList.add('done')
}
function resetSteps(){ALL_STEPS.forEach(s=>setStep(s,'pending'))}

function cap(s){return s?s[0].toUpperCase()+s.slice(1):''}

let S={chars:{},feed:[],world:{}}

async function runCycle() {
  if(manualRemaining() <= 0) return
  const btn=document.getElementById('run-btn')
  const msg=document.getElementById('status-msg')
  incManualCount()
  btn.disabled=true;btn.classList.add('busy');btn.textContent='⏳…'
  resetSteps();msg.textContent='Contacting server…'
  try {
    const r=await fetch('http://localhost:7777/runday',{signal:AbortSignal.timeout(3000)})
    const d=await r.json()
    if(d.status!=='started'){
      showMsg(btn,'busy','Busy…',2500);updateRunBtn();return
    }
    msg.textContent='Running…'
    const timer=setInterval(async()=>{
      try{
        const sr=await fetch('http://localhost:7777/status',{signal:AbortSignal.timeout(2000)})
        const s=await sr.json()
        ALL_STEPS.forEach(cyc=>{
          if(s.cycles_done?.includes(cyc))setStep(cyc,'done')
          else if(s.current_cycle===cyc)setStep(cyc,'running')
          else setStep(cyc,'pending')
        })
        if(s.current_cycle){
          msg.textContent=cap(s.current_cycle)+'…'
          btn.textContent='⏳ '+cap(s.current_cycle)
        }
        if(!s.running){
          clearInterval(timer)
          ALL_STEPS.forEach(s=>setStep(s,'done'))
          msg.textContent='Done!'
          btn.classList.remove('busy');btn.classList.add('done');btn.textContent='✓ Done'
          await reloadData()
          setTimeout(()=>{btn.classList.remove('done');msg.textContent='';updateRunBtn()},2200)
        }
      }catch{}
    },1500)
    setTimeout(()=>clearInterval(timer),120000)
  }catch{
    btn.classList.remove('busy')
    msg.textContent='Start trigger server'
    setTimeout(()=>{msg.textContent='';updateRunBtn()},3500)
  }
}

function showMsg(btn,cls,text,delay){
  btn.textContent=text
  setTimeout(()=>{btn.classList.remove(cls);btn.textContent='▶ Run';btn.disabled=false},delay)
}

async function reloadData(){
  const t=Date.now()
  const [c,f,w]=await Promise.all([
    fetch('data/characters.json?t='+t).then(r=>r.json()),
    fetch('data/feed.json?t='+t).then(r=>r.json()),
    fetch('data/world.json?t='+t).then(r=>r.json()),
  ])
  S.chars=c;S.feed=f;S.world=w;updateWorld()
}

async function init(){
  try{
    const [c,f,w]=await Promise.all([
      fetch('data/characters.json').then(r=>r.json()),
      fetch('data/feed.json').then(r=>r.json()),
      fetch('data/world.json').then(r=>r.json()),
    ])
    S.chars=c;S.feed=f;S.world=w;updateWorld()
  }catch(e){
    document.getElementById('day-label').textContent='Error'
    console.error(e)
  }
  return true
}

// ── STAT CARDS ───────────────────────────────────────────
const SC_COLORS = {marcus:'#93c5fd',ryan:'#fde68a',jade:'#f9a8d4'}
const SC_FILL   = {marcus:'#60a5fa',ryan:'#fbbf24',jade:'#f472b6'}
const SC_OTHERS = {marcus:['ryan','jade'],ryan:['marcus','jade'],jade:['marcus','ryan']}
const SCORE_LABELS = ['trust','openness','loneliness','resilience','ambition']

function buildStatCard(cid) {
  const el = document.getElementById('sc-'+cid)
  if(!el || !S.chars[cid]) return
  const c = S.chars[cid]
  const col = SC_COLORS[cid]
  const fill = SC_FILL[cid]

  const scoreRows = SCORE_LABELS.map(k => {
    const v = c.scores?.[k] ?? 0
    return `<div class="sc-row">
      <span class="sc-label">${k}</span>
      <div class="sc-bar"><div class="sc-fill" style="width:${v}%;background:${fill}88"></div></div>
      <span class="sc-val">${v}</span>
    </div>`
  }).join('')

  const bondRows = SC_OTHERS[cid].map(oid => {
    const rel = c.relationships?.[oid] || {}
    const cl = rel.closeness ?? 0
    const at = rel.attraction ?? 0
    const heart = at >= 30 ? ' ❤' : at >= 10 ? ' ·' : ''
    const oName = S.chars[oid]?.name?.split(' ')[0] || cap(oid)
    const oCol = SC_COLORS[oid]
    return `<div class="sc-bond" style="color:rgba(255,255,255,.6)">
      <span style="color:${oCol}">${oName}</span>
      <span style="color:rgba(255,255,255,.3)"> — closeness </span>
      <span style="color:${fill}">${cl}</span>${heart ? `<span style="color:#f43f5e;font-size:11px">${heart}</span>` : ''}
    </div>`
  }).join('')

  el.style.borderColor = col+'44'
  el.style.border = `1px solid ${col}33`
  el.innerHTML = `
    <div class="sc-name" style="color:${col}">${c.name||cap(cid)}</div>
    <div class="sc-mood">${c.mood||'—'}</div>
    <div class="sc-section">Stats</div>
    ${scoreRows}
    <div class="sc-section" style="margin-top:7px">Bonds</div>
    ${bondRows}
  `

  // auto-flip: if character is on right side, show card to the left
  const charEl = document.getElementById('char-'+cid)
  if(charEl) {
    const xPct = parseFloat(charEl.style.left||'50')
    el.classList.toggle('left', xPct > 55)
    el.classList.toggle('right', xPct <= 55)
  }
}

function updateStatCards() {
  ;['marcus','ryan','jade'].forEach(buildStatCard)
}

// ── ORACLE ────────────────────────────────────────────────
function toggleOracle() {
  document.getElementById('oracle-widget').classList.toggle('open')
}

async function loadOracle() {
  try {
    const fate = await fetch('data/fate.json?t='+Date.now()).then(r=>r.json())
    document.getElementById('oracle-text').textContent = fate.text || '—'
    let timeStr = ''
    if(fate.revealed_at) {
      const d = new Date(fate.revealed_at)
      const sgt = new Date(d.getTime() + d.getTimezoneOffset()*60000 + 8*3600000)
      const h=sgt.getHours(), m=String(sgt.getMinutes()).padStart(2,'0')
      const ap=h>=12?'pm':'am', h12=h%12||12
      timeStr = ` · ${h12}:${m}${ap}`
    }
    document.getElementById('oracle-choice').textContent = `DAY ${fate.day||1}${timeStr}`
    document.getElementById('oracle-widget').classList.add('open')
  } catch {
    document.getElementById('oracle-text').textContent = 'Fate not yet revealed'
    document.getElementById('oracle-choice').textContent = 'Sealed until midnight'
  }
}

setInterval(updateStatusBar,60000)
setInterval(updateRunBtn,60000)
init().then(()=>{ updateRunBtn(); loadOracle(); initTapStats() })
